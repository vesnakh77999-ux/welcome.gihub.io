<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div>
    <form style="text-align: center;font-family: khmer;">
        <fieldset>
            <p>សូមស្វាគមន៏មកកាន់ប្រព័ន្ធ</p>
            <div>
                <label for="example@email.com">អុីម៉ែលចូលប្រើប្រាស់</label><br>
                <input type="text" id="example@email.com" placeholder="example@email.com" required="">
                </div>
            
            <div>
                <label for="លេខសម្ងាត់ចូលប្រើប្រាស់">លេខសម្ងាត់ចូលប្រើប្រាស់</label><br>
                <input type="password" id="pinCode" minlength="8" maxlength="12" placeholder="វាយលេខកូដ ៤ ទៅ ៨ ខ្ទង់" required>
            </div>
            <p>បន្តជាមួយ</p>
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-google"></i>
            <i class="fa-brands fa-apple"></i>
            <div>
            <button style="background-color: rgb(54, 54, 247) ;color: antiquewhite;" spellcheck="login-btn">ចូលគណនី</button>
            </div>
            <u><p>ត្រូវការជំនួយ?</p></u>
        </fieldset>
    </form>
</body>
</html>
